<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas Idea Archive</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2c2c2c;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #bb86fc;
            --accent-hover: #9c4dcc;
            --success: #03dac6;
            --danger: #cf6679;
            --border: #333333;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 40px;
        }

        header {
            position: sticky;
            top: 0;
            background-color: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.25rem;
            color: var(--accent);
            font-weight: 700;
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--bg-input);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input, select, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            flex: 1;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--bg-input);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        button:active {
            transform: scale(0.97);
        }

        button.primary {
            background: var(--accent);
            color: #000;
            border: none;
        }

        main {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-x: hidden;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .card.removing {
            transform: translateX(120%);
            opacity: 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .badge {
            background: var(--bg-input);
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }

        /* Combined Single Text Box */
        .single-text-box {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #d4d4d4;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 16px;
            user-select: all;
            line-height: 1.6;
        }

        .copy-btn {
            width: 100%;
            background: var(--success);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        dialog {
            margin: auto;
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(3px);
        }

        dialog textarea {
            width: 100%;
            height: 250px;
            margin: 15px 0;
            resize: none;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .dialog-btns {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>Idea Archive</h1>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="stats" id="stats-counter">0 left</div>
                <button id="menu-btn" style="flex: none; padding: 6px 12px;">⚙️ Tools</button>
            </div>
        </div>
    </header>

    <main id="idea-list">
        <!-- Cards injected via JS -->
    </main>

    <div class="toast" id="toast">Copied & Archived!</div>

    <!-- Tools Modal -->
    <dialog id="tools-modal">
        <h2 style="color: var(--accent); margin-bottom: 10px;">Archive Tools</h2>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">
            Extract ideas from your text file automatically. The app will add them as perfect individual cards.
        </p>
        
        <button id="import-btn" class="primary" style="width: 100%; margin-bottom: 10px;">
            Extract Ideas from Text
        </button>
        <button id="reset-btn" style="width: 100%; margin-bottom: 20px; border-color: var(--danger); color: var(--danger);">
            Restore All Copied Ideas
        </button>
        <button id="close-tools" style="width: 100%;">Close</button>
    </dialog>

    <!-- Import Modal -->
    <dialog id="import-modal">
        <h2 style="color: var(--accent);">Paste Raw Text</h2>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">
            Paste your document here. The app will extract the new ideas and append them to your existing list.
        </p>
        <textarea id="import-textarea" placeholder="Paste your massive text file here..."></textarea>
        <div class="dialog-btns">
            <button id="cancel-import">Cancel</button>
            <button id="parse-import" class="primary">Slice & Save</button>
        </div>
    </dialog>

    <script>
        // State Management
        let db = [];
        let deletedIds = JSON.parse(localStorage.getItem('deletedIdeas')) || [];
        let customIdeas = JSON.parse(localStorage.getItem('customIdeas')) || [];
        
        let currentSort = 'number';
        let searchQuery = '';
        let renderList = [];

        // Initialization
        function initDB() {
            let needsSave = false;

            // Give every idea a permanent unique ID so deletion tracking doesn't break when you add new files
            customIdeas = customIdeas.map((item, index) => {
                if (!item.id) {
                    item.id = 'idea_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
                    needsSave = true;
                }
                return item;
            });

            if (needsSave) {
                localStorage.setItem('customIdeas', JSON.stringify(customIdeas));
            }

            // Map data for display
            db = customIdeas.map((item, index) => {
                return {
                    ...item,
                    displayNum: String(index + 1).padStart(3, '0'),
                    numericId: index + 1
                };
            });
            
            updateView();
        }

        // Rendering Logic
        function updateView() {
            // Filter out permanently deleted IDs
            renderList = db.filter(item => !deletedIds.includes(item.id));

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                renderList = renderList.filter(item => 
                    item.title.toLowerCase().includes(q) || 
                    item.algo.toLowerCase().includes(q)
                );
            }

            if (currentSort === 'number') {
                renderList.sort((a, b) => a.numericId - b.numericId);
            } else if (currentSort === 'text') {
                renderList.sort((a, b) => a.title.localeCompare(b.title));
            } else if (currentSort === 'random') {
                // Fix Random sort mutating the original array reference
                let shuffled = [...renderList];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                renderList = shuffled;
            }

            document.getElementById('stats-counter').innerText = `${renderList.length} left`;
            renderCards();
        }

        function renderCards() {
            const listEl = document.getElementById('idea-list');
            listEl.innerHTML = '';

            if (db.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <h2>No Ideas Found</h2>
                        <p style="margin-top:10px;">Click <strong>⚙️ Tools</strong> in the top right to paste your text file and generate your list!</p>
                    </div>`;
                return;
            }

            if (renderList.length === 0) {
                listEl.innerHTML = `<div class="empty-state">You've copied all available ideas! Reset in tools to start over.</div>`;
                return;
            }

            renderList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = `card-${item.id}`;
                
                const textBoxContent = `Name: ${item.title}\n\nAlgorithm: ${item.algo}\n\nSliders: ${item.sliders}`;

                // Displaying the visual sequential number, but keeping logic tied to the permanent ID
                card.innerHTML = `
                    <div class="card-header">
                        <h2 class="card-title">${item.title}</h2>
                        <span class="badge">#${item.displayNum}</span>
                    </div>
                    <div class="single-text-box" id="text-${item.id}">${textBoxContent}</div>
                    <button class="copy-btn" onclick="copyAndRemove('${item.id}')">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy & Remove
                    </button>
                `;
                listEl.appendChild(card);
            });
        }

        // Interactions
        window.copyAndRemove = function(id) {
            const textToCopy = document.getElementById(`text-${id}`).innerText;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast();
                const card = document.getElementById(`card-${id}`);
                card.classList.add('removing');
                
                setTimeout(() => {
                    deletedIds.push(id);
                    localStorage.setItem('deletedIdeas', JSON.stringify(deletedIds));
                    updateView();
                }, 300);
            }).catch(err => {
                alert("Failed to copy! Please try again.");
            });
        };

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        // Modals
        const toolsModal = document.getElementById('tools-modal');
        const importModal = document.getElementById('import-modal');

        document.getElementById('menu-btn').addEventListener('click', () => toolsModal.showModal());
        document.getElementById('close-tools').addEventListener('click', () => toolsModal.close());
        
        document.getElementById('import-btn').addEventListener('click', () => {
            toolsModal.close();
            importModal.showModal();
        });
        document.getElementById('cancel-import').addEventListener('click', () => importModal.close());

        document.getElementById('reset-btn').addEventListener('click', () => {
            if(confirm("Restore all copied ideas back to the list?")) {
                deletedIds = [];
                localStorage.removeItem('deletedIdeas');
                toolsModal.close();
                updateView();
            }
        });

        // --- The Powerful Text Slicer ---
        document.getElementById('parse-import').addEventListener('click', () => {
            const text = document.getElementById('import-textarea').value;
            if(!text) {
                alert("Please paste some text first.");
                return;
            }

            let extracted = [];
            const clean = (str) => str.replace(/[*#`]/g, '').trim();

            let m;

            // 1. Slice ideas formatted like: ### 401. Title \n **Search Intent:** ... \n **The Algorithm:** ... \n **Sliders:**
            const regex200to600 = /###\s*\d+\.\s*([^\n]+)[\s\S]*?Algorithm:\*?\*?\s*([\s\S]*?)\*?\*?Sliders:\*?\*?\s*([^\n]+)/gi;
            while ((m = regex200to600.exec(text))) {
                extracted.push({ title: clean(m[1]), algo: clean(m[2]), sliders: clean(m[3]) });
            }

            // 2. Slice ideas formatted like: ### 1. Title \n * Primary Controls: ... \n * Technical Algorithm Blueprint: ... 
            const regex1to100 = /###\s*\d+\.\s*([^\n]+)[\s\S]*?Primary Controls(?:.*?):\s*([^\n]+)[\s\S]*?Technical Algorithm Blueprint(?:.*?):\s*([\s\S]*?)(?=\n###|\n---|$)/gi;
            while ((m = regex1to100.exec(text))) {
                extracted.push({ title: clean(m[1]), sliders: clean(m[2]), algo: clean(m[3]).replace(/^\s*\d+\.\s/gm, '- ') });
            }

            // 3. Slice ideas formatted like: <!-- PROMPT: 0001 -->
            const regexPrompt = /<!--\s*PROMPT:\s*\d+\s*-->\s*([^\n]+)\s+([\s\S]*?)(?:-\s*)?Sliders:\s*([^\n]+)\s*<!--\s*END PROMPT\s*-->/gi;
            while ((m = regexPrompt.exec(text))) {
                extracted.push({ title: clean(m[1]), algo: clean(m[2]), sliders: clean(m[3]) });
            }

            // Remove exact duplicates from the *newly* pasted batch
            const uniqueExtracts = Array.from(new Set(extracted.map(a => a.title)))
                .map(title => extracted.find(a => a.title === title));

            if (uniqueExtracts.length > 0) {
                // Prepare new items with permanent unique IDs
                const newItemsWithIds = uniqueExtracts.map(item => ({
                    ...item,
                    id: 'idea_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9)
                }));

                // Check against existing database to prevent pasting the exact same document twice
                const existingTitles = new Set(customIdeas.map(i => i.title));
                const freshItems = newItemsWithIds.filter(item => !existingTitles.has(item.title));

                if (freshItems.length > 0) {
                    // APPEND the new items to the existing ones!
                    customIdeas = [...customIdeas, ...freshItems]; 
                    localStorage.setItem('customIdeas', JSON.stringify(customIdeas));
                    
                    alert(`Success! Added ${freshItems.length} new ideas to your archive.`);
                    importModal.close();
                    document.getElementById('import-textarea').value = '';
                    
                    initDB(); // Refresh the UI
                } else {
                    alert("Ideas found, but they are already in your list! No new items were added.");
                }
            } else {
                alert("No ideas found! Ensure you pasted the raw text correctly.");
            }
        });

        // Start
        initDB();
    </script>
</body>
</html>
